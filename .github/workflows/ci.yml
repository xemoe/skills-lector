name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            packages/core/package-lock.json
            packages/presets/package-lock.json
            apps/web/package-lock.json

      - name: Install packages/core
        run: npm ci --prefix packages/core

      - name: Install packages/presets
        run: npm ci --prefix packages/presets

      - name: Install apps/web
        run: npm ci --prefix apps/web

      - name: Build (Turbopack — also type-checks)
        run: npm run build
