name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly audit re-scan — picks up newly published advisories against
    # the lockfiles even when nothing in the repo has changed.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    # Start non-blocking — flip to blocking once the baseline is clean.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit packages/core
        run: npm audit --audit-level=high --prefix packages/core

      - name: Audit packages/presets
        run: npm audit --audit-level=high --prefix packages/presets

      - name: Audit apps/web
        run: npm audit --audit-level=high --prefix apps/web

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
