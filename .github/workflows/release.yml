name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            packages/core/package-lock.json
            packages/presets/package-lock.json
            apps/web/package-lock.json

      - name: Install packages/core
        run: npm ci --prefix packages/core

      - name: Install packages/presets
        run: npm ci --prefix packages/presets

      - name: Install apps/web
        run: npm ci --prefix apps/web

      - name: Build
        run: npm run build

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Capture everything from the matching `## [<version>]` header up to
          # (but not including) the next `## [` header. Falls back to a generic
          # note if no matching section is present.
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<__EOF__"
            echo "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
